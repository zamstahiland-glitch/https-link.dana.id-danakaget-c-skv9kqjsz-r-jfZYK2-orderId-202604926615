<script>
  // Coba unmute otomatis; beberapa browser akan tetap memblokir jika tidak ada interaksi.
  const audio = document.getElementById('audio');
  setTimeout(()=>{ audio.muted = false; audio.play().catch(()=>{}); }, 400);

  // Tombol "Ambil Sekarang" juga memicu suara jika autoplay diblokir.

    const btn = document.getElementById('take');
    btn.innerText = 'Uang Diambil ✓';
    btn.disabled = true;
  });
